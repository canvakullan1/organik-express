---
# cPanel Git™ Version Control — otomatik deploy yapılandırması.
#
# KURULUM MANTIĞI (ana domain Document Root = public_html, değiştirilemiyor):
#   - Repo  /home/organikexpress/repositories/site  klasörüne klonlanır.
#   - Deploy sırasında repo'nun public/ içeriği public_html/'e kopyalanır.
#   - public_html/index.php, uygulamayı repo konumundan yükleyen başlatıcıyla değiştirilir.
#   - storage sembolik linki public_html için yeniden kurulur.
#
# PHP yolu çoğu cPanel'de /usr/local/bin/php (hesabın seçili PHP sürümü).
# Çalışmazsa /opt/cpanel/ea-php82/root/usr/bin/php deneyin.
deployment:
  tasks:
    - export APPDIR=/home/organikexpress/repositories/site
    - export DOCROOT=/home/organikexpress/public_html
    - export PHP=/usr/local/bin/php
    # NOT: composer install KALDIRILDI — vendor klasörü repoya dahil, gerekmez
    # (shared hosting'de composer install bellek/ağ yüzünden takılıyordu).
    # Veritabanı güncellemeleri (yeni tablo/sütun eklenmişse)
    - /bin/bash -c "cd $APPDIR && $PHP artisan migrate --force 2>&1"
    # Uygulama içi storage linki ($APPDIR/public/storage -> $APPDIR/storage/app/public)
    - /bin/bash -c "cd $APPDIR && $PHP artisan storage:link 2>&1 || true"
    # Önbellekleri tazele (config + route + view + event)
    - /bin/bash -c "cd $APPDIR && $PHP artisan optimize:clear 2>&1"
    - /bin/bash -c "cd $APPDIR && $PHP artisan optimize 2>&1"
    # --- Katalog: 2. dalga ürünleri içe aktar (HIZLI: görsel indirmesi YOK) ---
    # Görsel indirmesi deploy'u uzatıp zaman aşımına uğratıyordu; --skip-images ile
    # ürünler saniyeler içinde girer. Görseller repoya commit'li dosyalardan bağlanır
    # (import yerel products/*.jpg varsa DB kaydı açar, indirme yapmaz).
    - /bin/bash -c "cd $APPDIR && $PHP artisan import:catalog2 --skip-images 2>&1 || true"
    # İlk kurulumda organikgiller'den çekilen ürünleri kaldır (soft-delete, geri alınabilir)
    - /bin/bash -c "cd $APPDIR && $PHP artisan catalog:purge-source organikgiller 2>&1 || true"
    # --- public_html'e yayınla ---
    # Varsayılan cPanel index dosyalarını kaldır (Laravel index.php gölgelenmesin)
    - /bin/bash -c "rm -f $DOCROOT/index.html $DOCROOT/default.html 2>&1 || true"
    # public/ içeriğini public_html'e kopyala (build assets, .htaccess, favicon, robots vb.)
    - /bin/bash -c "cp -R $APPDIR/public/. $DOCROOT/ 2>&1"
    # index.php'yi repo konumunu işaret eden başlatıcıyla değiştir
    - /bin/bash -c "cp $APPDIR/deploy/public_html-index.php $DOCROOT/index.php 2>&1"
    # storage linkini public_html için (yeniden) oluştur -> görseller /storage/... ile servis edilir
    - /bin/bash -c "rm -rf $DOCROOT/storage && ln -s $APPDIR/storage/app/public $DOCROOT/storage 2>&1 || true"
